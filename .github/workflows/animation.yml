name: Generate Galaga Arcade Graph

on:
  schedule:
    # Runs automatically every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to run this manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Step 1: Clone the repository contents
      - uses: actions/checkout@v4

      # Step 2: Run the arcade generator specifically for Galaga
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: "galaga" # Tells the generator to make the Galaga game variant

      # Step 3: Push the SVGs to the branch your README expects
      - name: push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output # Matches your README branch
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
